<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Junnar Vadhu Var Suchak Mandal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Mukta:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --maroon: #7b1e1e;
      --maroon-dark: #4e1515;
      --maroon-light: #a52a2a;
      --gold: #c9a84c;
      --cream: #f8f3ef;
      --white: #fff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Mukta', sans-serif;
      background: var(--maroon-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .header {
      background: var(--maroon);
      color: white;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    nav a {
      color: white;
      text-decoration: none;
      margin-left: 18px;
      font-weight: 600;
      font-size: 15px;
    }
    nav a:hover { text-decoration: underline; }

    /* ── LOGIN WRAPPER ── */
    .login-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(123,30,30,0.35) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.12) 0%, transparent 50%),
        var(--maroon-dark);
    }

    .login-box {
      background: var(--white);
      border-radius: 20px;
      width: 100%;
      max-width: 440px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      animation: slideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── LOGIN HEADER BAND ── */
    .login-header {
      background: linear-gradient(135deg, var(--maroon) 0%, var(--maroon-dark) 100%);
      padding: 36px 36px 30px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .login-header::before {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: rgba(201,168,76,0.15);
    }
    .login-header::after {
      content: '';
      position: absolute;
      bottom: -20px; left: -20px;
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
    }
    .mandal-icon {
      font-size: 48px;
      line-height: 1;
      margin-bottom: 10px;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
    }
    .login-header h2 {
      font-family: 'Playfair Display', serif;
      color: var(--white);
      font-size: 22px;
      margin-bottom: 5px;
    }
    .login-header p {
      color: rgba(255,255,255,0.65);
      font-size: 13px;
      letter-spacing: 0.5px;
    }

    /* ── FORM BODY ── */
    .login-body {
      padding: 32px 36px 36px;
    }

    .form-group {
      margin-bottom: 22px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--maroon-dark);
      margin-bottom: 7px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .input-wrap {
      position: relative;
    }
    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: #aaa;
      pointer-events: none;
    }
    .form-group input {
      width: 100%;
      padding: 13px 14px 13px 42px;
      border: 2px solid #e8e0d8;
      border-radius: 10px;
      font-size: 15px;
      font-family: 'Mukta', sans-serif;
      color: #333;
      background: #fdfaf7;
      transition: border 0.25s, box-shadow 0.25s;
      outline: none;
    }
    .form-group input:focus {
      border-color: var(--maroon);
      box-shadow: 0 0 0 3px rgba(123,30,30,0.1);
      background: #fff;
    }

    /* ── ERROR BOX ── */
    .error-box {
      display: none;
      background: #ffeaea;
      border: 1.5px solid #e57373;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 20px;
      color: #c0392b;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: shake 0.4s ease;
    }
    .error-box.hidden { display: none !important; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60%  { transform: translateX(-6px); }
      40%,80%  { transform: translateX(6px); }
    }

    /* ── LOGIN BUTTON ── */
    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--maroon) 0%, var(--maroon-dark) 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-family: 'Mukta', sans-serif;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
      box-shadow: 0 6px 20px rgba(78,21,21,0.35);
    }
    .btn-login:hover {
      filter: brightness(1.15);
      transform: translateY(-1px);
      box-shadow: 0 10px 28px rgba(78,21,21,0.45);
    }
    .btn-login:active {
      transform: translateY(0);
    }

    /* ── HINT ── */
    .login-hint {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      color: #999;
    }
    .login-hint span {
      color: var(--maroon);
      font-weight: 600;
    }

    /* ── FOOTER ── */
    .footer {
      background: #3a0f0f;
      color: rgba(255,255,255,0.6);
      text-align: center;
      padding: 16px;
      font-size: 13px;
    }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, #e8e0d8, transparent);
      margin: 24px 0;
    }

    @media (max-width: 480px) {
      .login-body { padding: 24px 22px 28px; }
      .login-header { padding: 28px 22px 24px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="logo">Junnar Vadhu Var Suchak Mandal</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <div class="login-wrapper">
    <div class="login-box">

      <div class="login-header">
        <div class="mandal-icon">🪷</div>
        <h2>Member Login</h2>
        <p>Access biodata profiles securely</p>
      </div>

      <div class="login-body">

        <!-- Error message -->
        <div class="error-box hidden" id="errorBox">
          ⚠️ <span id="errorMsg">Invalid username or password. Please try again.</span>
        </div>

        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="username" placeholder="Enter your username" autocomplete="username" />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
          </div>
        </div>

        <div class="divider"></div>

        <button class="btn-login" onclick="handleLogin()">Login &amp; View Biodata →</button>

        <div class="login-hint">
          Contact admin to get access &nbsp;|&nbsp; <span>+91 98765 43210</span>
        </div>

      </div>
    </div>
  </div>

  <footer class="footer">
    © 2026 Junnar Vadhu Var Suchak Mandal. All Rights Reserved.
  </footer>

  <!-- Load static credentials -->
  <script src="credentials.js"></script>

  <script>
    // Allow login on Enter key press
    document.getElementById("password").addEventListener("keydown", function(e) {
      if (e.key === "Enter") handleLogin();
    });
    document.getElementById("username").addEventListener("keydown", function(e) {
      if (e.key === "Enter") handleLogin();
    });

    function handleLogin() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const errorBox = document.getElementById("errorBox");
      const errorMsg = document.getElementById("errorMsg");

      // Basic empty check
      if (!username || !password) {
        showError("Please enter both username and password.");
        return;
      }

      // Check against static credentials
      const match = USERS.find(
        u => u.username === username && u.password === password
      );

      if (match) {
        // Store session flag
        sessionStorage.setItem("loggedIn", "true");
        sessionStorage.setItem("loginUser", username);
        // Redirect to biodata page
        window.location.href = "biodata.html";
      } else {
        showError("Invalid username or password. Please try again.");
      }
    }

    function showError(msg) {
      const errorBox = document.getElementById("errorBox");
      const errorMsg = document.getElementById("errorMsg");
      errorMsg.textContent = msg;
      errorBox.classList.remove("hidden");
      // Re-trigger shake animation
      errorBox.style.animation = "none";
      errorBox.offsetHeight; // reflow
      errorBox.style.animation = "";
    }
  </script>

</body>
</html>
