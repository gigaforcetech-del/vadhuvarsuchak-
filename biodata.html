<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biodata - Junnar Vadhu Var Suchak Mandal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <div class="logo">Junnar Vadhu Var Suchak Mandal</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="biodata.html">Biodata</a>
      <span id="loginName" class="login-name"></span>
      <button onclick="logout()" class="btn-logout">Logout</button>
    </nav>
  </header>
  
  <section class="section">
    <h2>Select Profile Type</h2>

    <div class="selection-buttons">
      <button onclick="showProfiles('male')" class="btn">Looking for Male</button>
      <button onclick="showProfiles('female')" class="btn">Looking for Female</button>
    </div>

   
<div class="filters">

   <select id="professionFilter" onchange="applyFilters()">
    <option value="">All Professions</option>
    <option value="engineer">Engineer</option>
    <option value="business">Business</option>
    <option value="nurse">Nurse</option>
    <option value="accountant">Accountant</option>
    <option value="working">Working</option>
    <option value="non working">Non Working</option>
    <option value="graduation">Graduation</option>
  </select>

  <select id="ageFilter" onchange="applyFilters()">
    <option value="">All Ages</option>
    <option value="25">Below 25</option>
    <option value="26">Below 26</option>
    <option value="27">Below 27</option>
    <option value="28">Below 28</option>
    <option value="29">Below 29</option>
    <option value="30">Below 30</option>
  </select>

  <select id="heightFilter" onchange="applyFilters()">
    <option value="">All Heights</option>
    <option value="60">5'0" & above</option>
    <option value="61">5'1" & above</option>
    <option value="62">5'2" & above</option>
    <option value="63">5'3" & above</option>
    <option value="64">5'4" & above</option>
    <option value="65">5'5" & above</option>
    <option value="66">5'6" & above</option>
    <option value="67">5'7" & above</option>
    <option value="68">5'8" & above</option>
  </select>

</div>

    <h2 id="profileTitle" class="profile-title">Profiles</h2>

    <div id="profileContainer" class="biodata-grid"></div>

    <div id="paginationContainer" class="pagination"></div>
  </section>
  
  <footer class="footer">
    <p>© 2026 Junnar Vadhu Var Suchak Mandal. All Rights Reserved.</p>
  </footer>

  <script src="auth.js"></script>
  <script src="profiles.js"></script>
  <script src="app.js"></script>
</body>
</html>
